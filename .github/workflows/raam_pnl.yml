name: RAAM Live P&L Updater

on:
  schedule:
    # Every 5 min, Mon-Fri, 9:15 AM to 3:30 PM IST (3:45-10:00 UTC)
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch:

jobs:
  update_pnl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: raam-pnl-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Update P&L
        env:
          UPSTOX_TOKEN: ${{ secrets.UPSTOX_TOKEN }}
          PORTFOLIO_VALUE: ${{ secrets.PORTFOLIO_VALUE }}
          MODE: ${{ secrets.MODE }}
        run: python raam_pnl.py

      - name: Commit dashboard (rebase loop)
        run: |
          git config user.name "RAAM-Bot"
          git config user.email "raam@github-actions"
          
          # Stage our new file
          git add dashboard_data.json
          
          # Nothing to commit? Exit cleanly
          if git diff --staged --quiet; then
            echo "No changes detected."
            exit 0
          fi
          
          git commit -m "P&L update $(date -u +'%H:%M UTC')"
          
          # Push with rebase loop — handles concurrent runs correctly
          for i in 1 2 3 4 5 6 7 8; do
            if git push origin main; then
              echo "Pushed successfully on attempt $i"
              exit 0
            fi
            echo "Push rejected. Pulling remote with rebase... (attempt $i)"
            
            # Pull remote changes, replaying our commit on top
            # -X ours means: if conflict in dashboard_data.json, prefer THEIR version
            # then we add our newer data on top (next iteration regenerates anyway)
            git pull --rebase -X ours origin main || git rebase --abort
            
            # Add file again in case rebase touched it
            git add dashboard_data.json
            git commit --amend --no-edit --allow-empty || true
            
            # Random jitter so two parallel runs don't lockstep collide again
            sleep $((RANDOM % 5 + 2))
          done
          
          echo "Failed to push after 8 attempts. Will retry next run."
          exit 0   # don't fail the workflow — next run will catch up
