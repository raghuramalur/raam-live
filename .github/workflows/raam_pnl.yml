name: RAAM Live P&L Updater

on:
  schedule:
    # Every 5 min, Mon-Fri, 9:15 AM to 3:30 PM IST (3:45-10:00 UTC)
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch:

jobs:
  update_pnl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: raam-pnl-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Update P&L
        env:
          UPSTOX_TOKEN: ${{ secrets.UPSTOX_TOKEN }}
          PORTFOLIO_VALUE: ${{ secrets.PORTFOLIO_VALUE }}
          MODE: ${{ secrets.MODE }}
        run: python raam_pnl.py

      - name: Commit dashboard (Fetch & Reset Method)
        run: |
          git config user.name "RAAM-Bot"
          git config user.email "raam@github-actions"
          
          # 1. Download the absolute latest state of the remote repository
          git fetch origin main
          
          # 2. Force the local git history to match the remote EXACTLY. 
          # (Because we don't use --hard, the new dashboard_data.json stays safely on the disk)
          git reset origin/main
          
          # 3. Add our newly generated file
          git add dashboard_data.json
          
          # 4. Commit and Push. If it still fails, the 5-second retry loop catches it.
          if ! git diff --staged --quiet; then
            git commit -m "P&L update $(date +'%H:%M')"
            
            for i in 1 2 3 4 5; do
              git push origin main && exit 0
              echo "Collision! Re-syncing with remote... (Attempt $i)"
              git fetch origin main
              git reset origin/main
              git add dashboard_data.json
              git commit --amend --no-edit # Staple the change to the new top commit
              sleep 5
            done
            exit 1
          else
            echo "No changes detected."
          fi
