name: RAAM Weekly Execution Engine

on:
  schedule:
    - cron: '0 10 * * 5'
  workflow_dispatch:

jobs:
  raam_execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # <--- FIX 1: Forces GitHub to download full history so rebase works

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: raam-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Run RAAM engine
        env:
          UPSTOX_TOKEN:       ${{ secrets.UPSTOX_TOKEN }}
          PORTFOLIO_VALUE:    ${{ secrets.PORTFOLIO_VALUE }}
          MODE:               ${{ secrets.MODE }}
          BINANCE_API_KEY:    ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
        run: python raam_runner.py

      - name: Commit results with Auto-Retry
        run: |
          git config user.name "RAAM-Bot"
          git config user.email "raam@github-actions"
          git add dashboard_data.json
          git add data/stage_3/trade_log.csv || true
          
          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "RAAM auto-rebalance $(date +'%Y-%m-%d')"
            
            # <--- FIX 2: The Auto-Retry Loop --->
            # If the remote changed, pull the changes, prioritize THIS bot's data on collision, and push.
            for i in 1 2 3 4 5; do
              git pull --rebase -X theirs origin main && git push origin main && exit 0
              echo "Push collision detected! Retrying in 5 seconds... (Attempt $i of 5)"
              sleep 5
            done
            
            echo "Failed to push after 5 attempts."
            exit 1
          else
            echo "No execution changes detected, skipping commit."
          fi
