name: RAAM Weekly Execution Engine

on:
  schedule:
    - cron: '0 10 * * 5'
  workflow_dispatch:

jobs:
  raam_execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: raam-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Run RAAM engine
        env:
          UPSTOX_TOKEN:       ${{ secrets.UPSTOX_TOKEN }}
          PORTFOLIO_VALUE:    ${{ secrets.PORTFOLIO_VALUE }}
          MODE:               ${{ secrets.MODE }}
          BINANCE_API_KEY:    ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
        run: python raam_runner.py

      - name: Commit results (rebase loop)
        env:
          GIT_MERGE_AUTOEDIT: no
        run: |
          git config user.name "RAAM-Bot"
          git config user.email "raam@github-actions"
          
          git add dashboard_data.json
          git add data/stage_3/trade_log.csv || true
          
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          
          git commit -m "RAAM auto-rebalance $(date +'%Y-%m-%d')"
          
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push rejected, rebasing... (attempt $i)"
            git pull --rebase -X ours origin main || git rebase --abort
            git add dashboard_data.json
            git add data/stage_3/trade_log.csv || true
            git commit --amend --no-edit --allow-empty || true
            sleep $((RANDOM % 5 + 3))
          done
          
          exit 1
