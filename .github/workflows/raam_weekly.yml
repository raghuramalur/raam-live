name: RAAM Weekly Execution Engine

on:
  schedule:
    - cron: '0 10 * * 5'
  workflow_dispatch:

jobs:
  raam_execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: raam-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Run RAAM engine
        env:
          UPSTOX_TOKEN:       ${{ secrets.UPSTOX_TOKEN }}
          PORTFOLIO_VALUE:    ${{ secrets.PORTFOLIO_VALUE }}
          MODE:               ${{ secrets.MODE }}
          BINANCE_API_KEY:    ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
        run: python raam_runner.py

      - name: Commit results (Fetch & Reset Method)
        run: |
          git config user.name "RAAM-Bot"
          git config user.email "raam@github-actions"
          
          # 1. Download the absolute latest state of the remote repository
          git fetch origin main
          
          # 2. Force the local git history to match the remote EXACTLY. 
          git reset origin/main
          
          # 3. Add our newly generated files
          git add dashboard_data.json
          git add data/stage_3/trade_log.csv || true
          
          # 4. Commit and Push. Auto-retry loop catches collisions.
          if ! git diff --staged --quiet; then
            git commit -m "RAAM auto-rebalance $(date +'%Y-%m-%d')"
            
            for i in 1 2 3 4 5; do
              git push origin main && exit 0
              echo "Collision! Re-syncing with remote... (Attempt $i)"
              git fetch origin main
              git reset origin/main
              git add dashboard_data.json
              git add data/stage_3/trade_log.csv || true
              git commit --amend --no-edit # Staple the change to the new top commit
              sleep 5
            done
            exit 1
          else
            echo "No execution changes detected, skipping commit."
          fi
